<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
<title>Goblin Siege</title>
<link rel="stylesheet" href="css/styles.css">
</head>
<body>
<div id="gc">
  <div id="hud">
    <div class="hi">❤️<span class="v hv" id="hHP">20</span></div>
    <div class="hi">💰<span class="v gv" id="hG">200</span></div>
    <div class="hsp"></div>
    <span id="wl">Wave 0</span>
    <button id="goBtn" style="display:none">▶ Start</button>
    <div class="hsp"></div>
    <div class="hi">🏭<span class="v" style="color:#10b981" id="hI">+0</span></div>
    <div class="hi">⚡<span class="v" style="color:#a78bfa" id="hSP">0</span></div>
    <button id="svBtn">💾</button>
    <button id="ldBtn">📂</button>
    <button id="exBtn">📤</button>
    <button id="imBtn">📥</button>
    <button id="snd">🔊</button>
  </div>
  <canvas id="cv"></canvas>
  <div id="bp">
    <div id="tabs">
      <div class="tab on" data-t="towers">Towers</div>
      <div class="tab" data-t="spells">Spells</div>
      <div class="tab" data-t="factory">Factory</div>
      <div class="tab" data-t="skills">Skill Tree</div>
    </div>
    <div id="pc"></div>
  </div>
  <div id="tdesc"></div>
  <div id="ov" class="hid">
    <h1 id="oT">⚔️ Goblin Siege ⚔️</h1>
    <div class="sub" id="oD">11 towers · Boss waves · Skill trees · Spells · Random events<br>Build, upgrade, survive!</div>
    <div class="st" id="oS"></div>
    <button id="oB">Begin Battle</button>
  </div>
  <div id="tt"><div class="ttt" id="ttT"></div><div class="tts" id="ttS"></div><div class="tta" id="ttA"></div></div>
  <div id="wb"></div>
  <div id="bL"></div>
  <div id="evBanner"></div>
  <div id="tip"></div>
  <div id="skP">
    <h2>⚡ Skill Tree</h2>
    <div id="skC"></div>
    <button id="skClose">Close</button>
  </div>
  <div id="welcome">
    <div id="welcomeBox">
      <button id="welcomeX">✕</button>
      <h1 id="welcomeTitle">⚔️ Welcome to Goblin Siege</h1>
      <div id="welcomeNotes"></div>
      <p id="welcomeFoot">Thank you for playing Goblin Siege!</p>
    </div>
  </div>
</div>
<script type="module" src="js/main.js"></script>
</body>
</html>
